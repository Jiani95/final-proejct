<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guestbook</title>
  <link rel="icon" href="images/Website Icon.png" type="image/png">
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="guestbook-page">
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <nav class="navbar" aria-label="Primary navigation">
    <a href="index.html" class="logo" aria-label="Go to home page">
      <img src="images/Website Icon.png" alt="" class="logo-icon" width="36" height="36" decoding="async" />
    </a>

    <ul class="nav-links">
      <li><a href="about.html">About</a></li>
      <li><a href="kittens.html">Kittens</a></li>
      <li><a href="Guestbook.html" class="active" aria-current="page">Guestbook</a></li>
    </ul>
  </nav>

  <main id="main-content" class="guestbook-wrap">
    <div class="guestbook-title-row">
      <img src="images/guestbook.png" alt="" class="guestbook-title-icon" width="62" height="62" decoding="async" />
      <h1 id="guestbook-page-heading" class="guestbook-title">Guestbook</h1>
    </div>

    <form class="guestbook-form" aria-labelledby="guestbook-page-heading">
      <label for="name">Name</label>
      <input id="name" name="name" type="text" autocomplete="name" />

      <label for="visit-day">Visit day</label>
      <input id="visit-day" name="visit-day" type="date" autocomplete="off" />

      <label for="thoughts">Thoughts</label>
      <textarea id="thoughts" name="thoughts" rows="4" autocomplete="off"></textarea>

      <fieldset class="guestbook-gift-fieldset">
        <legend class="gift-question">Send greetings to cats?</legend>
        <label><input type="radio" name="gift" value="yes" /> Yes</label>
        <label><input type="radio" name="gift" value="no" /> No</label>
      </fieldset>

      <button type="submit">Submit</button>
    </form>
  </main>

  <footer class="footer-block">
    <p class="site-copyright">© 2026 Jiani Huang</p>
  </footer>
</body>
</html>
